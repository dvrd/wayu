# wayu.toml - Example configuration file for wayu
# Documentation: https://github.com/dvrd/wayu

# ============================================================================
# BASIC SETTINGS
# ============================================================================

version = "1.0"
shell = "zsh"
wayu_version = "3.4.0"

# ============================================================================
# PATH CONFIGURATION
# ============================================================================

[path]
entries = [
    "/usr/local/bin",
    "/usr/local/sbin",
    "$HOME/.cargo/bin",
    "$HOME/.local/bin",
    "$HOME/.npm-global/bin",
]
dedup = true      # Remove duplicate entries
clean = false     # Don't remove non-existent paths automatically

# ============================================================================
# ALIASES - One per line, format: name = "command"
# ============================================================================

[aliases]
ll = "ls -lah"
la = "ls -A"
ls = "lsd"
tree = "lsd --tree"
gs = "git status"
gcm = "git commit -m"
gp = "git push"
gco = "git checkout"
gd = "git diff"
config = "vim $SHELL_CONFIG"
reload = "source ~/.zshrc"
vim = "nvim"
cat = "bat"
py = "python3"

# ============================================================================
# CONSTANTS - One per line, format: NAME = "value"
# ============================================================================

[constants]
EDITOR = "nvim"
PAGER = "less -R"
LANG = "en_US.UTF-8"
CONFIGS = "$HOME/.config"
FUNCS = "$CONFIGS/wayu/functions"
SHELL_CONFIG = "$CONFIGS/wayu/extra.zsh"
OSS = "$HOME/dev/oss"
UPWORK = "$HOME/dev/work/upwork"
GOPATH = "$HOME/go"
NVM_DIR = "$HOME/.nvm"
BUN_INSTALL = "$HOME/.bun"
JAVA_HOME = "/Library/Java/JavaVirtualMachines/zulu-11.jdk/Contents/Home"

# Secrets (use env vars or wayu.local.toml for actual secrets)
# OPENAI_API_KEY = { value = "sk-...", secret = true }

# ============================================================================
# PLUGINS - With detailed options
# ============================================================================

[plugins.zsh-autosuggestions]
source = "github:zsh-users/zsh-autosuggestions"
version = "v0.7.0"
# defer = true      # Load after first prompt for faster startup
priority = 50     # Lower = loads earlier (default: 100)

[plugins.fast-syntax-highlighting]
source = "github:zdharma-continuum/fast-syntax-highlighting"
version = "master"
priority = 60

[plugins.zsh-completions]
source = "github:zsh-users/zsh-completions"
version = "master"
# defer = true
priority = 70

# ============================================================================
# SETTINGS
# ============================================================================

[settings]
auto_backup = true       # Create backup before modifying configs
fuzzy_fallback = true    # Enable fuzzy matching on GET operations
dry_run_default = false  # Don't require --dry-run by default

# ============================================================================
# PROFILES - Environment-specific configurations
# ============================================================================

[profile.work]
condition = "test -f /work/.env"  # Auto-activate if /work/.env exists

[profile.work.path]
entries = ["/work/tools/bin", "/opt/company/bin"]

[profile.work.aliases]
deploy = "make deploy"
logs = "kubectl logs -f deployment/app"

[profile.work.constants]
WORK_ENV = "production"
PROJECT_ROOT = "/work/current-project"

[profile.work.plugins.company-zsh-theme]
source = "local:/work/dotfiles/zsh-theme"
priority = 10

# Minimal profile for fast startup
[profile.minimal]
condition = "test $WAYU_FAST = 1"  # Activate with WAYU_FAST=1

[profile.minimal.path]
entries = ["/usr/local/bin", "/usr/bin"]
# Minimal: no aliases, constants, or plugins
