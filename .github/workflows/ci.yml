name: CI

on:
  push:
    branches: [main, develop]
    tags-ignore: ['v*.*.*']   # release.yml handles tag pushes
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Odin
      uses: laytan/setup-odin@v2
      with:
        release: latest

    - name: Build wayu
      run: |
        mkdir -p bin
        odin build src -out:bin/wayu -o:speed

    - name: Verify build
      run: ./bin/wayu version

    - name: Setup test environment
      run: mkdir -p ~/.config/wayu/backup

    - name: Run unit tests
      run: odin test tests/unit -file -o:speed -define:ODIN_TEST_THREADS=1 -ignore-unused-defineables

    - name: Test CLI exit codes
      run: |
        EXIT_CODE=0
        ./bin/wayu path add > /dev/null 2>&1 || EXIT_CODE=$?
        if [ "$EXIT_CODE" -eq 64 ]; then
          echo "CLI returns correct exit code 64 for missing args"
        else
          echo "Expected exit code 64, got $EXIT_CODE"
          exit 1
        fi

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Odin
      uses: laytan/setup-odin@v2
      with:
        release: latest

    - name: Build with warnings as errors
      run: |
        mkdir -p bin
        odin build src -out:bin/wayu -warnings-as-errors -o:speed

  release-check:
    name: Release Readiness
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check version consistency
      run: |
        VERSION=$(grep '^VERSION ::' src/main.odin | sed 's/VERSION :: "\(.*\)"/\1/')
        if [ -z "$VERSION" ]; then
          echo "Could not extract version from src/main.odin"
          exit 1
        fi
        echo "Version: $VERSION"

    - name: Check required files exist
      run: |
        for f in README.md docs/index.html .github/workflows/release.yml; do
          [ -f "$f" ] || { echo "Missing: $f"; exit 1; }
        done
        echo "All required files present"
