name: Bump Version & Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type (leave empty for auto-detect from commits)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump-and-release:
    name: Bump version and trigger release
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install git-cliff
      run: cargo install git-cliff --locked

    - name: Determine next version
      id: version
      run: |
        BUMP_TYPE="${{ inputs.bump_type || '' }}"
        if [ -n "$BUMP_TYPE" ]; then
          VERSION=$(git cliff --bumped-version --bump "$BUMP_TYPE")
        else
          VERSION=$(git cliff --bumped-version)
        fi
        CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "Current tag: $CURRENT  →  Next version: $VERSION"
        if [ "$VERSION" = "$CURRENT" ]; then
          echo "No version bump needed — skipping release."
          echo "SKIP=true" >> $GITHUB_OUTPUT
        else
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "SKIP=false" >> $GITHUB_OUTPUT
        fi

    - name: Update VERSION in src/main.odin
      if: steps.version.outputs.SKIP != 'true'
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        VERSION_BARE="${VERSION#v}"
        sed -i "s/VERSION :: \"[^\"]*\"/VERSION :: \"${VERSION_BARE}\"/" src/main.odin
        grep 'VERSION ::' src/main.odin

    - name: Generate CHANGELOG
      if: steps.version.outputs.SKIP != 'true'
      run: git cliff --tag ${{ steps.version.outputs.VERSION }} -o CHANGELOG.md

    - name: Commit release files
      if: steps.version.outputs.SKIP != 'true'
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add src/main.odin CHANGELOG.md
        git commit -m "chore: release ${{ steps.version.outputs.VERSION }}"
        git push origin main

    - name: Create and push tag
      if: steps.version.outputs.SKIP != 'true'
      run: |
        git tag ${{ steps.version.outputs.VERSION }}
        git push origin ${{ steps.version.outputs.VERSION }}
