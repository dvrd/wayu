name: Bump Version & Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type (leave empty for auto-detect from commits)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

# Serialize all runs of this workflow. The bump step pushes a `chore: release`
# commit which itself triggers a second run; concurrency makes the second run
# wait until the first finishes publishing, at which point its republish path
# detects "tag + release already at HEAD" and short-circuits.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  bump:
    name: Bump version
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      mode: ${{ steps.version.outputs.MODE }}
      skip: ${{ steps.version.outputs.SKIP }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true            # fetch ALL tags, including orphans whose commits aren't on main
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install git-cliff
      run: cargo install git-cliff --locked

    - name: Determine action
      id: version
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Refresh tag state from origin (catches orphan tags whose target
        # commits are not reachable from main).
        git fetch --tags --prune --prune-tags origin

        HEAD_MSG=$(git log -1 --format=%s)
        HEAD_VERSION=$(echo "$HEAD_MSG" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' || true)

        # Three operating modes:
        #   bump      — fresh feature/fix commits since last tag.
        #               Edit VERSION + CHANGELOG, commit, tag, atomic push.
        #   republish — HEAD is already "chore: release vX.Y.Z" (a prior run
        #               committed the bump but didn't finish tagging/publishing).
        #               Skip the bump; just (re)point tag and publish.
        #   skip      — nothing to release; tag and release already at HEAD.
        if [[ "$HEAD_MSG" == "chore: release $HEAD_VERSION" ]] && [ -n "$HEAD_VERSION" ]; then
          VERSION="$HEAD_VERSION"
          MODE="republish"
        else
          BUMP_TYPE="${{ inputs.bump_type || '' }}"
          if [ -n "$BUMP_TYPE" ]; then
            VERSION=$(git cliff --bumped-version --bump "$BUMP_TYPE")
          else
            VERSION=$(git cliff --bumped-version)
          fi
          CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          if [ "$VERSION" = "$CURRENT" ]; then
            MODE="skip"
          else
            MODE="bump"
          fi
        fi

        # In republish mode, short-circuit if the tag is already at HEAD AND
        # the GitHub release exists — i.e. a prior run actually finished and
        # this run was just triggered by the bot's own release commit.
        if [ "$MODE" = "republish" ]; then
          TAG_OID=$(git rev-parse "refs/tags/$VERSION" 2>/dev/null || echo "")
          HEAD_OID=$(git rev-parse HEAD)
          if [ "$TAG_OID" = "$HEAD_OID" ] && gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Tag and release for $VERSION are already at HEAD — nothing to do."
            MODE="skip"
          fi
        fi

        echo "::notice::Mode=$MODE  Version=$VERSION  HEAD=$(git rev-parse --short HEAD)"
        {
          echo "VERSION=$VERSION"
          echo "MODE=$MODE"
          if [ "$MODE" = "skip" ]; then
            echo "SKIP=true"
          else
            echo "SKIP=false"
          fi
        } >> $GITHUB_OUTPUT

    - name: Auto-reconcile stale tag
      # If a tag for the target version already exists at a commit that is
      # not HEAD, it's an orphan from a prior aborted run. Auto-delete it
      # (and its release if any) so the bump/republish step can recreate
      # it cleanly. This is what makes the workflow self-healing — without
      # it, a stale tag would force `git tag` to fail and require manual
      # cleanup.
      if: steps.version.outputs.SKIP != 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        if ! git rev-parse "refs/tags/$VERSION" >/dev/null 2>&1; then
          echo "Tag $VERSION does not exist — nothing to reconcile."
          exit 0
        fi
        EXISTING=$(git rev-parse "refs/tags/$VERSION")
        HEAD_OID=$(git rev-parse HEAD)
        if [ "$EXISTING" = "$HEAD_OID" ]; then
          echo "Tag $VERSION already at HEAD — nothing to reconcile."
          exit 0
        fi
        echo "::warning::Stale $VERSION tag at $EXISTING (HEAD is $HEAD_OID) — auto-cleaning."
        # `gh release delete --cleanup-tag` removes the GitHub release AND
        # the underlying tag in one shot; if the release doesn't exist,
        # fall back to deleting the remote tag directly.
        gh release delete "$VERSION" --cleanup-tag --yes 2>/dev/null \
          || git push origin ":refs/tags/$VERSION" 2>/dev/null \
          || true
        git tag -d "$VERSION" 2>/dev/null || true

    - name: Update VERSION in src/main.odin
      if: steps.version.outputs.MODE == 'bump'
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        VERSION_BARE="${VERSION#v}"
        sed -i "s/VERSION :: \"[^\"]*\"/VERSION :: \"${VERSION_BARE}\"/" src/main.odin
        grep 'VERSION ::' src/main.odin

    - name: Generate CHANGELOG
      if: steps.version.outputs.MODE == 'bump'
      run: git cliff --tag ${{ steps.version.outputs.VERSION }} -o CHANGELOG.md

    - name: Commit and tag
      if: steps.version.outputs.SKIP != 'true'
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        VERSION="${{ steps.version.outputs.VERSION }}"
        MODE="${{ steps.version.outputs.MODE }}"

        if [ "$MODE" = "republish" ]; then
          # Bump commit already exists at HEAD — only (re)point the tag.
          # Idempotent: if the tag is already at HEAD this is a no-op net change.
          git tag -d "$VERSION" 2>/dev/null || true
          git push origin ":refs/tags/$VERSION" 2>/dev/null || true
          git tag "$VERSION"
          git push origin "$VERSION"
        else
          # bump: ship commit + tag atomically. If either ref refuses to
          # update (race with another push, etc.) NEITHER updates, leaving
          # main consistent and the next push to retry from a clean state.
          git add src/main.odin CHANGELOG.md
          git commit -m "chore: release $VERSION"
          git tag "$VERSION"
          git push --atomic origin main "$VERSION"
        fi

  build-release:
    name: Build ${{ matrix.artifact }}
    needs: bump
    if: needs.bump.outputs.skip != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            artifact: wayu-linux-amd64
          - os: macos-latest
            target: macos-arm64
            artifact: wayu-macos-arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.bump.outputs.version }}

    - name: Setup Odin
      uses: laytan/setup-odin@v2
      with:
        release: latest

    - name: Build optimized release
      run: |
        mkdir -p bin
        odin build src -out:bin/wayu -o:speed
        chmod +x bin/wayu

    - name: Verify build
      run: ./bin/wayu version

    - name: Package and compute SHA256
      run: |
        tar -czf ${{ matrix.artifact }}.tar.gz -C bin wayu
        if [[ "$RUNNER_OS" == "macOS" ]]; then
          shasum -a 256 ${{ matrix.artifact }}.tar.gz | awk '{print $1}' > ${{ matrix.artifact }}.sha256
        else
          sha256sum ${{ matrix.artifact }}.tar.gz | awk '{print $1}' > ${{ matrix.artifact }}.sha256
        fi
        echo "SHA256=$(cat ${{ matrix.artifact }}.sha256)"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: |
          ${{ matrix.artifact }}.tar.gz
          ${{ matrix.artifact }}.sha256

  create-release:
    name: Create GitHub Release
    needs: [bump, build-release]
    if: needs.bump.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.bump.outputs.version }}
        fetch-depth: 0
        fetch-tags: true

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Install git-cliff
      run: cargo install git-cliff --locked

    - name: Generate release notes
      run: git cliff --latest --strip header > release_notes.md

    - name: Create Release
      # softprops/action-gh-release updates an existing release at the same
      # tag, so this step is idempotent — safe to re-run in republish mode.
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ needs.bump.outputs.version }}
        name: wayu ${{ needs.bump.outputs.version }}
        body_path: release_notes.md
        draft: false
        prerelease: false
        files: |
          artifacts/wayu-linux-amd64/wayu-linux-amd64.tar.gz
          artifacts/wayu-linux-amd64/wayu-linux-amd64.sha256
          artifacts/wayu-macos-arm64/wayu-macos-arm64.tar.gz
          artifacts/wayu-macos-arm64/wayu-macos-arm64.sha256
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew-tap:
    name: Update Homebrew tap
    needs: [bump, create-release]
    if: needs.bump.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Download macOS artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Extract version and SHAs
      id: vars
      run: |
        VERSION="${{ needs.bump.outputs.version }}"
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "VERSION_BARE=${VERSION#v}" >> $GITHUB_OUTPUT
        echo "ARM64_SHA=$(cat artifacts/wayu-macos-arm64/wayu-macos-arm64.sha256)" >> $GITHUB_OUTPUT

    - name: Checkout tap repo
      uses: actions/checkout@v4
      with:
        repository: dvrd/homebrew-wayu
        token: ${{ secrets.TAP_GITHUB_TOKEN }}
        path: tap

    - name: Update formula
      env:
        VERSION:      ${{ steps.vars.outputs.VERSION }}
        VERSION_BARE: ${{ steps.vars.outputs.VERSION_BARE }}
        ARM64_SHA:    ${{ steps.vars.outputs.ARM64_SHA }}
      run: |
        mkdir -p tap/Formula
        cat > tap/Formula/wayu.rb << FORMULA
        class Wayu < Formula
          desc "Shell configuration management CLI — PATH, aliases, env vars, plugins"
          homepage "https://github.com/dvrd/wayu"
          version "${VERSION_BARE}"
          license "MIT"

          url "https://github.com/dvrd/wayu/releases/download/${VERSION}/wayu-macos-arm64.tar.gz"
          sha256 "${ARM64_SHA}"

          def install
            bin.install "wayu"
          end

          def caveats
            <<~EOS
              Initialize wayu config files by running:
                wayu init

              Then add this line to your shell RC file:
                source ~/.config/wayu/init.zsh   # zsh
                source ~/.config/wayu/init.bash  # bash
            EOS
          end

          test do
            assert_match version.to_s, shell_output("#{bin}/wayu version")
          end
        end
        FORMULA

    - name: Commit and push formula
      working-directory: tap
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Formula/wayu.rb
        # Tolerate "nothing to commit" so re-runs (republish path) don't fail
        # when the formula already has the right version + SHA.
        if git diff --cached --quiet; then
          echo "Formula already up-to-date for ${{ steps.vars.outputs.VERSION }} — nothing to push."
        else
          git commit -m "wayu ${{ steps.vars.outputs.VERSION }}"
          git push
        fi
