name: Bump Version & Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type (leave empty for auto-detect from commits)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - patch
          - minor
          - major
      recreate_tag:
        description: 'Recreate a missing tag (e.g., v3.8.0) - use if release failed previously'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: read

jobs:
  bump:
    name: Bump version
    runs-on: ubuntu-latest
    # Skip if this is a release commit AND the tag already exists
    if: "!startsWith(github.event.head_commit.message, 'chore: release') || (startsWith(github.event.head_commit.message, 'chore: release') && !contains(github.event.head_commit.message, github.ref_name))"

    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      skip: ${{ steps.version.outputs.SKIP }}
      recreate_tag: ${{ steps.version.outputs.RECREATE_TAG }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        # When recreating a tag, we need the specific commit
        ref: ${{ inputs.recreate_tag != '' && github.sha || github.ref }}

    - name: Install git-cliff
      run: cargo install git-cliff --locked

    - name: Determine next version
      id: version
      run: |
        # Check if manual tag recreation requested
        RECREATE_TAG="false"
        MANUAL_TAG="${{ inputs.recreate_tag || '' }}"
        
        if [ -n "$MANUAL_TAG" ]; then
          echo "Manual tag recreation requested: $MANUAL_TAG"
          VERSION="$MANUAL_TAG"
          RECREATE_TAG="true"
        else
          BUMP_TYPE="${{ inputs.bump_type || '' }}"
          if [ -n "$BUMP_TYPE" ]; then
            VERSION=$(git cliff --bumped-version --bump "$BUMP_TYPE")
          else
            VERSION=$(git cliff --bumped-version)
          fi
        fi
        
        CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "Current tag: $CURRENT  â†’  Next version: $VERSION"
        
        # Check if we need to recreate a missing tag (auto-detect)
        if [ "$RECREATE_TAG" != "true" ] && [ "${{ startsWith(github.event.head_commit.message, 'chore: release') }}" = "true" ]; then
          # Extract version from commit message
          COMMIT_VERSION=$(echo "${{ github.event.head_commit.message }}" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' || echo "")
          if [ -n "$COMMIT_VERSION" ]; then
            if ! git rev-parse "$COMMIT_VERSION" >/dev/null 2>&1; then
              echo "Tag $COMMIT_VERSION missing but commit exists â€” will recreate tag"
              VERSION="$COMMIT_VERSION"
              RECREATE_TAG="true"
            fi
          fi
        fi
        
        if [ "$VERSION" = "$CURRENT" ] && [ "$RECREATE_TAG" != "true" ]; then
          echo "No version bump needed â€” skipping release."
          echo "SKIP=true" >> $GITHUB_OUTPUT
        else
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "SKIP=false" >> $GITHUB_OUTPUT
          echo "RECREATE_TAG=$RECREATE_TAG" >> $GITHUB_OUTPUT
        fi

    - name: Update VERSION in src/main.odin
      if: steps.version.outputs.SKIP != 'true'
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        VERSION_BARE="${VERSION#v}"
        sed -i "s/VERSION :: \"[^\"]*\"/VERSION :: \"${VERSION_BARE}\"/" src/main.odin
        grep 'VERSION ::' src/main.odin

    - name: Generate CHANGELOG
      if: steps.version.outputs.SKIP != 'true'
      run: git cliff --tag ${{ steps.version.outputs.VERSION }} -o CHANGELOG.md

    - name: Commit release files and tag
      if: steps.version.outputs.SKIP != 'true'
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # Only commit if we're not recreating a tag
        if [ "${{ steps.version.outputs.RECREATE_TAG }}" != "true" ]; then
          git add src/main.odin CHANGELOG.md
          git commit -m "chore: release ${{ steps.version.outputs.VERSION }}" || echo "Commit may already exist"
          git push origin main
        else
          echo "Recreating tag for existing commit"
        fi
        
        # Create/push tag (force if recreating)
        if [ "${{ steps.version.outputs.RECREATE_TAG }}" = "true" ]; then
          git tag -d ${{ steps.version.outputs.VERSION }} 2>/dev/null || true
          git push origin :refs/tags/${{ steps.version.outputs.VERSION }} 2>/dev/null || true
        fi
        git tag ${{ steps.version.outputs.VERSION }}
        git push origin ${{ steps.version.outputs.VERSION }}

  build-release:
    name: Build ${{ matrix.artifact }}
    needs: bump
    if: needs.bump.outputs.skip != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            artifact: wayu-linux-amd64
          - os: macos-latest
            target: macos-arm64
            artifact: wayu-macos-arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.bump.outputs.version }}

    - name: Setup Odin
      uses: laytan/setup-odin@v2
      with:
        release: latest

    - name: Build optimized release
      run: |
        mkdir -p bin
        odin build src -out:bin/wayu -o:speed
        chmod +x bin/wayu

    - name: Verify build
      run: ./bin/wayu version

    - name: Package and compute SHA256
      run: |
        tar -czf ${{ matrix.artifact }}.tar.gz -C bin wayu
        if [[ "$RUNNER_OS" == "macOS" ]]; then
          shasum -a 256 ${{ matrix.artifact }}.tar.gz | awk '{print $1}' > ${{ matrix.artifact }}.sha256
        else
          sha256sum ${{ matrix.artifact }}.tar.gz | awk '{print $1}' > ${{ matrix.artifact }}.sha256
        fi
        echo "SHA256=$(cat ${{ matrix.artifact }}.sha256)"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: |
          ${{ matrix.artifact }}.tar.gz
          ${{ matrix.artifact }}.sha256

  create-release:
    name: Create GitHub Release
    needs: [bump, build-release]
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.bump.outputs.version }}

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Install git-cliff
      run: cargo install git-cliff --locked

    - name: Generate release notes
      run: git cliff --latest --strip header > release_notes.md

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ needs.bump.outputs.version }}
        name: wayu ${{ needs.bump.outputs.version }}
        body_path: release_notes.md
        draft: false
        prerelease: false
        files: |
          artifacts/wayu-linux-amd64/wayu-linux-amd64.tar.gz
          artifacts/wayu-linux-amd64/wayu-linux-amd64.sha256
          artifacts/wayu-macos-arm64/wayu-macos-arm64.tar.gz
          artifacts/wayu-macos-arm64/wayu-macos-arm64.sha256
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew-tap:
    name: Update Homebrew tap
    needs: [bump, create-release]
    runs-on: ubuntu-latest
    # Always run if release was created (even if tag existed before)
    if: needs.bump.outputs.skip != 'true' || needs.bump.outputs.recreate_tag == 'true'

    steps:
    - name: Download macOS artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Extract version and SHAs
      id: vars
      run: |
        VERSION="${{ needs.bump.outputs.version }}"
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "VERSION_BARE=${VERSION#v}" >> $GITHUB_OUTPUT
        echo "ARM64_SHA=$(cat artifacts/wayu-macos-arm64/wayu-macos-arm64.sha256)" >> $GITHUB_OUTPUT

    - name: Checkout tap repo
      uses: actions/checkout@v4
      with:
        repository: dvrd/homebrew-wayu
        token: ${{ secrets.TAP_GITHUB_TOKEN }}
        path: tap

    - name: Update formula
      env:
        VERSION:      ${{ steps.vars.outputs.VERSION }}
        VERSION_BARE: ${{ steps.vars.outputs.VERSION_BARE }}
        ARM64_SHA:    ${{ steps.vars.outputs.ARM64_SHA }}
      run: |
        mkdir -p tap/Formula
        cat > tap/Formula/wayu.rb << FORMULA
        class Wayu < Formula
          desc "Shell configuration management CLI â€” PATH, aliases, env vars, plugins"
          homepage "https://github.com/dvrd/wayu"
          version "${VERSION_BARE}"
          license "MIT"

          url "https://github.com/dvrd/wayu/releases/download/${VERSION}/wayu-macos-arm64.tar.gz"
          sha256 "${ARM64_SHA}"

          def install
            bin.install "wayu"
          end

          def caveats
            <<~EOS
              Initialize wayu config files by running:
                wayu init

              Then add this line to your shell RC file:
                source ~/.config/wayu/init.zsh   # zsh
                source ~/.config/wayu/init.bash  # bash
            EOS
          end

          test do
            assert_match version.to_s, shell_output("#{bin}/wayu version")
          end
        end
        FORMULA

    - name: Commit and push formula
      working-directory: tap
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Formula/wayu.rb
        git commit -m "wayu ${{ steps.vars.outputs.VERSION }}"
        git push
